<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nIA — Vista previa del logo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=Exo+2:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#06101f; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:60px; padding:40px 20px; font-family:'Barlow',sans-serif; }

  @keyframes natia-pulse { 0%,100%{opacity:0.55} 50%{opacity:1} }
  @keyframes natia-scan  { 0%{stroke-dashoffset:40} 100%{stroke-dashoffset:0} }
  .natia-dot-a { animation: natia-pulse 2.4s ease-in-out infinite; }
  .natia-dot-b { animation: natia-pulse 2.4s ease-in-out infinite; animation-delay:1.2s; }
  .natia-scan-line { stroke-dasharray:6 4; animation: natia-scan 1.8s linear infinite; }

  @keyframes nt-pulse-b { 0%,100%{opacity:0.7}  50%{opacity:1} }
  @keyframes nt-pulse-p { 0%,100%{opacity:0.5}  50%{opacity:0.9} }
  .nt-led-b  { animation:nt-pulse-b 2s   ease-in-out infinite; }
  .nt-led-p  { animation:nt-pulse-p 2.5s ease-in-out infinite; animation-delay:0.5s; }
  .nt-light  { animation:nt-pulse-b 1.4s ease-in-out infinite; }

  /* ── PREVIEW HEADER ── */
  .preview-header {
    background: linear-gradient(135deg, #0f1c3f 0%, #1e3a6e 60%, #1a3260 100%);
    border-bottom: 3px solid #E8601C;
    border-radius:14px;
    padding:0 28px;
    height:64px;
    display:flex; align-items:center; gap:14px;
    width:100%; max-width:620px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  .preview-header .title { font-family:'Exo 2',sans-serif; font-size:22px; font-weight:700; letter-spacing:1px; color:#fff; }
  .preview-header .title .ia { color:#E8601C; text-shadow:0 0 12px rgba(232,96,28,0.7); }
  .preview-header .sub { font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:1.5px; text-transform:uppercase; }

  /* ── PREVIEW LOGIN CARD (dark, como en la app real) ── */
  .preview-login-card {
    background: linear-gradient(180deg,#06101f 0%,#0a1428 100%);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius:18px;
    width:100%; max-width:440px;
    box-shadow: 0 0 60px rgba(0,150,255,0.12), 0 0 120px rgba(150,0,255,0.06), 0 24px 80px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  .preview-login-card .card-body {
    padding:20px 36px 36px;
    text-align:center;
  }
  .preview-login-card .nia-title {
    font-family:'Exo 2',sans-serif; font-size:30px; font-weight:700;
    letter-spacing:3px; color:#fff; line-height:1; margin-bottom:3px;
  }
  .preview-login-card .nia-title .ia { color:#E8601C; text-shadow:0 0 14px rgba(232,96,28,0.7); }
  .preview-login-card .nia-sub {
    font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:2px; text-transform:uppercase; margin-bottom:24px;
  }
  .preview-login-card .field-mock {
    background:rgba(255,255,255,0.06); border:1.5px solid rgba(0,212,255,0.2);
    border-radius:8px; height:42px; margin-bottom:14px;
    display:flex; align-items:center; padding:0 14px;
    color:rgba(255,255,255,0.22); font-size:13px; font-family:'Barlow',sans-serif;
  }
  .preview-login-card .btn-mock {
    width:100%; height:44px; border-radius:8px;
    background:linear-gradient(135deg,#E8601C,#d44f10);
    color:#fff; font-family:'Exo 2',sans-serif; font-weight:700;
    font-size:14px; letter-spacing:2px; border:none; margin-top:4px;
  }

  .label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.25); margin-bottom:12px; text-align:center; }
</style>
