<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nIA — Vista previa del logo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=Exo+2:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#06101f; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:60px; padding:40px 20px; font-family:'Barlow',sans-serif; }

  @keyframes natia-pulse { 0%,100%{opacity:0.55} 50%{opacity:1} }
  @keyframes natia-scan  { 0%{stroke-dashoffset:40} 100%{stroke-dashoffset:0} }
  .natia-dot-a { animation: natia-pulse 2.4s ease-in-out infinite; }
  .natia-dot-b { animation: natia-pulse 2.4s ease-in-out infinite; animation-delay:1.2s; }
  .natia-scan-line { stroke-dasharray:6 4; animation: natia-scan 1.8s linear infinite; }

  /* ── PREVIEW HEADER ── */
  .preview-header {
    background: linear-gradient(135deg, #0f1c3f 0%, #1e3a6e 60%, #1a3260 100%);
    border-bottom: 3px solid #E8601C;
    border-radius:14px;
    padding:0 28px;
    height:64px;
    display:flex; align-items:center; gap:14px;
    width:100%; max-width:620px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  .preview-header .title { font-family:'Exo 2',sans-serif; font-size:22px; font-weight:700; letter-spacing:1px; color:#fff; }
  .preview-header .title .ia { color:#E8601C; text-shadow:0 0 12px rgba(232,96,28,0.7); }
  .preview-header .sub { font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:1.5px; text-transform:uppercase; }

  /* ── PREVIEW LOGIN ── */
  .preview-login {
    background:#fff;
    border-radius:16px;
    padding:36px 44px;
    text-align:center;
    box-shadow:0 16px 48px rgba(0,0,0,0.5);
    width:100%; max-width:340px;
  }
  .preview-login .title { font-family:'Exo 2',sans-serif; font-size:36px; font-weight:700; letter-spacing:2px; color:#0f1c3f; margin:10px 0 4px; line-height:1; }
  .preview-login .title .ia { color:#E8601C; }
  .preview-login .sub { font-size:11px; color:#8a9ab8; letter-spacing:1px; text-transform:uppercase; }

  .label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.25); margin-bottom:12px; text-align:center; }
</style>
</head>
<body>

<!-- HEADER PREVIEW -->
<div>
  <div class="label">Vista previa — Barra superior</div>
  <div class="preview-header">
    <svg width="40" height="46" viewBox="0 0 50 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ng1" x1="0" y1="0" x2="50" y2="58" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#00e5ff"/><stop offset="55%" stop-color="#4f8ef7"/><stop offset="100%" stop-color="#E8601C"/>
        </linearGradient>
        <filter id="ngf1" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <polygon points="25,2 48,15.5 48,42.5 25,56 2,42.5 2,15.5" fill="#06101f" stroke="url(#ng1)" stroke-width="1.8"/>
      <polygon points="25,9 41,18.5 41,39.5 25,49 9,39.5 9,18.5" fill="none" stroke="#1a3260" stroke-width="0.7"/>
      <line class="natia-scan-line" x1="2" y1="29" x2="9" y2="29" stroke="#00e5ff" stroke-width="0.9" opacity="0.6"/>
      <line class="natia-scan-line" x1="41" y1="29" x2="48" y2="29" stroke="#E8601C" stroke-width="0.9" opacity="0.6" style="animation-delay:0.9s"/>
      <circle class="natia-dot-a" cx="25" cy="2" r="2.2" fill="#00e5ff" filter="url(#ngf1)"/>
      <circle cx="48" cy="15.5" r="1.8" fill="#00e5ff" opacity="0.65"/>
      <circle cx="48" cy="42.5" r="1.8" fill="#E8601C" opacity="0.75"/>
      <circle class="natia-dot-b" cx="25" cy="56" r="2.2" fill="#E8601C" filter="url(#ngf1)"/>
      <circle cx="2" cy="42.5" r="1.8" fill="#E8601C" opacity="0.65"/>
      <circle cx="2" cy="15.5" r="1.8" fill="#00e5ff" opacity="0.75"/>
      <!-- Trailer -->
      <rect x="9" y="24" width="21" height="14" rx="0.5" fill="rgba(0,229,255,0.06)" stroke="url(#ng1)" stroke-width="1.3"/>
      <!-- Cab -->
      <polygon points="30,38 30,24 36,18 43,24 43,38" fill="rgba(0,229,255,0.06)" stroke="url(#ng1)" stroke-width="1.3"/>
      <rect x="28.5" y="32" width="3.5" height="2.5" fill="rgba(79,142,247,0.15)" stroke="#4f8ef7" stroke-width="0.6"/>
      <line x1="40" y1="18" x2="40" y2="12" stroke="#E8601C" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
      <circle cx="40" cy="11" r="1.8" fill="none" stroke="#E8601C" stroke-width="0.8" opacity="0.5"/>
      <rect x="42.5" y="27" width="1.5" height="3" rx="0.5" fill="#00e5ff" opacity="0.9" filter="url(#ngf1)"/>
      <rect x="8" y="26" width="1.5" height="3" rx="0.5" fill="#E8601C" opacity="0.8"/>
      <line x1="10" y1="31" x2="30" y2="31" stroke="rgba(0,229,255,0.18)" stroke-width="0.6"/>
      <line x1="3" y1="34" x2="8" y2="34" stroke="#00e5ff" stroke-width="0.7" opacity="0.35"/>
      <line x1="4" y1="37" x2="8" y2="37" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
      <circle cx="16" cy="42" r="4" fill="none" stroke="#E8601C" stroke-width="1.2" opacity="0.85"/>
      <circle cx="16" cy="42" r="1.8" fill="#E8601C" opacity="0.3"/>
      <circle cx="24" cy="42" r="4" fill="none" stroke="#E8601C" stroke-width="1.2" opacity="0.85"/>
      <circle cx="24" cy="42" r="1.8" fill="#E8601C" opacity="0.3"/>
      <circle cx="37" cy="42" r="3.5" fill="none" stroke="#E8601C" stroke-width="1.2" opacity="0.85"/>
      <circle cx="37" cy="42" r="1.5" fill="#E8601C" opacity="0.3"/>
      <line x1="6" y1="46" x2="44" y2="46" stroke="rgba(0,229,255,0.1)" stroke-width="0.5" stroke-dasharray="2 3"/>
    </svg>
    <div>
      <div class="title">n<span class="ia">IA</span></div>
      <div class="sub">BOOM Logistics · Control de Ofertas</div>
    </div>
  </div>
</div>

<!-- LOGIN PREVIEW -->
<div>

  <div class="preview-login">
    <svg style="margin:0 auto;display:block;filter:drop-shadow(0 0 14px rgba(0,229,255,0.35));" width="80" height="93" viewBox="0 0 50 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ng2" x1="0" y1="0" x2="50" y2="58" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#00e5ff"/><stop offset="55%" stop-color="#4f8ef7"/><stop offset="100%" stop-color="#E8601C"/>
        </linearGradient>
        <filter id="ngf2" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <polygon points="25,2 48,15.5 48,42.5 25,56 2,42.5 2,15.5" fill="#06101f" stroke="url(#ng2)" stroke-width="1.8"/>
      <polygon points="25,9 41,18.5 41,39.5 25,49 9,39.5 9,18.5" fill="none" stroke="#1a3260" stroke-width="0.7"/>
      <line class="natia-scan-line" x1="2" y1="29" x2="9" y2="29" stroke="#00e5ff" stroke-width="0.9" opacity="0.6"/>
      <line class="natia-scan-line" x1="41" y1="29" x2="48" y2="29" stroke="#E8601C" stroke-width="0.9" opacity="0.6" style="animation-delay:0.9s"/>
      <circle class="natia-dot-a" cx="25" cy="2" r="2.2" fill="#00e5ff" filter="url(#ngf2)"/>
      <circle cx="48" cy="15.5" r="1.8" fill="#00e5ff" opacity="0.65"/>
      <circle cx="48" cy="42.5" r="1.8" fill="#E8601C" opacity="0.75"/>
      <circle class="natia-dot-b" cx="25" cy="56" r="2.2" fill="#E8601C" filter="url(#ngf2)"/>
      <circle cx="2" cy="42.5" r="1.8" fill="#E8601C" opacity="0.65"/>
      <circle cx="2" cy="15.5" r="1.8" fill="#00e5ff" opacity="0.75"/>
      <rect x="9" y="24" width="21" height="14" rx="0.5" fill="rgba(0,229,255,0.06)" stroke="url(#ng2)" stroke-width="1.3"/>
      <polygon points="30,38 30,24 36,18 43,24 43,38" fill="rgba(0,229,255,0.06)" stroke="url(#ng2)" stroke-width="1.3"/>
      <rect x="28.5" y="32" width="3.5" height="2.5" fill="rgba(79,142,247,0.15)" stroke="#4f8ef7" stroke-width="0.6"/>
      <line x1="40" y1="18" x2="40" y2="12" stroke="#E8601C" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
      <circle cx="40" cy="11" r="1.8" fill="none" stroke="#E8601C" stroke-width="0.8" opacity="0.5"/>
      <rect x="42.5" y="27" width="1.5" height="3" rx="0.5" fill="#00e5ff" opacity="0.9" filter="url(#ngf2)"/>
      <rect x="8" y="26" width="1.5" height="3" rx="0.5" fill="#E8601C" opacity="0.8"/>
      <line x1="10" y1="31" x2="30" y2="31" stroke="rgba(0,229,255,0.18)" stroke-width="0.6"/>
      <line x1="3" y1="34" x2="8" y2="34" stroke="#00e5ff" stroke-width="0.7" opacity="0.35"/>
      <line x1="4" y1="37" x2="8" y2="37" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
      <circle cx="16" cy="42" r="4" fill="none" stroke="#E8601C" stroke-width="1.2" opacity="0.85"/>
      <circle cx="16" cy="42" r="1.8" fill="#E8601C" opacity="0.3"/>
      <circle cx="24" cy="42" r="4" fill="none" stroke="#E8601C" stroke-width="1.2" opacity="0.85"/>
      <circle cx="24" cy="42" r="1.8" fill="#E8601C" opacity="0.3"/>
      <circle cx="37" cy="42" r="3.5" fill="none" stroke="#E8601C" stroke-width="1.2" opacity="0.85"/>
      <circle cx="37" cy="42" r="1.5" fill="#E8601C" opacity="0.3"/>
      <line x1="6" y1="46" x2="44" y2="46" stroke="rgba(0,229,255,0.1)" stroke-width="0.5" stroke-dasharray="2 3"/>
    </svg>
    <div class="title">n<span class="ia">IA</span></div>
    <div class="sub">BOOM Logistics Colombia S.A.S.</div>
  </div>
</div>

</body>
</html>
